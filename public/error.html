<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Authorization Error | OIDC Auth</title>
		<style>
			:root {
				color-scheme: dark;
				--bg: #07090f;
				--panel: #111827;
				--text: #f8fafc;
				--muted: #9ca3af;
				--line: #263145;
				--accent: #38bdf8;
				--danger: #fb7185;
				--danger-soft: rgba(251, 113, 133, 0.14);
				--shadow: 0 24px 70px rgba(0, 0, 0, 0.45);
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				min-height: 100vh;
				font-family:
					Inter,
					ui-sans-serif,
					system-ui,
					-apple-system,
					BlinkMacSystemFont,
					"Segoe UI",
					sans-serif;
				background:
					radial-gradient(circle at top left, rgba(251, 113, 133, 0.16), transparent 28rem),
					linear-gradient(135deg, #07090f 0%, #0f172a 52%, #111827 100%);
				color: var(--text);
				display: grid;
				place-items: center;
				padding: 32px 16px;
			}

			main {
				width: min(100%, 520px);
			}

			.error-card {
				background: rgba(17, 24, 39, 0.92);
				border: 1px solid rgba(148, 163, 184, 0.16);
				border-radius: 10px;
				box-shadow: var(--shadow);
				padding: 32px;
				backdrop-filter: blur(16px);
			}

			.eyebrow {
				display: inline-flex;
				align-items: center;
				gap: 8px;
				padding: 8px 12px;
				border-radius: 999px;
				background: var(--danger-soft);
				color: #fecdd3;
				font-size: 0.85rem;
				font-weight: 700;
				letter-spacing: 0.02em;
				text-transform: uppercase;
			}

			h1 {
				margin: 18px 0 10px;
				font-size: clamp(2rem, 8vw, 2.8rem);
				line-height: 1.05;
			}

			p {
				margin: 0;
				color: var(--muted);
				line-height: 1.65;
				font-size: 1rem;
			}

			.error-box {
				margin-top: 24px;
				padding: 16px 18px;
				border: 1px solid rgba(251, 113, 133, 0.3);
				border-radius: 8px;
				background: rgba(15, 23, 42, 0.78);
			}

			.error-box strong {
				display: block;
				margin-bottom: 6px;
				color: #fee2e2;
				font-size: 0.95rem;
			}

			.actions {
				display: flex;
				flex-wrap: wrap;
				gap: 12px;
				margin-top: 28px;
			}

			.button {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				min-height: 48px;
				padding: 0 18px;
				border-radius: 8px;
				text-decoration: none;
				font-weight: 800;
				transition:
					transform 160ms ease,
					filter 160ms ease,
					background 160ms ease;
			}

			.button.primary {
				background: linear-gradient(135deg, var(--accent), #0ea5e9);
				color: #02111f;
			}

			.button.secondary {
				border: 1px solid var(--line);
				background: rgba(15, 23, 42, 0.85);
				color: var(--text);
			}

			.button:hover {
				filter: brightness(1.06);
				transform: translateY(-1px);
			}

			@media (max-width: 520px) {
				body {
					padding: 18px 12px;
				}

				.error-card {
					padding: 24px;
				}

				.actions {
					flex-direction: column;
				}

				.button {
					width: 100%;
				}
			}
		</style>
	</head>
	<body>
		<main>
			<section class="error-card" aria-labelledby="error-title">
				<div class="eyebrow">OIDC Auth</div>
				<h1 id="error-title">Authorization Error</h1>
				<p id="error-summary">
					This authorization request could not be completed with the information provided.
				</p>

				<div class="error-box" role="alert" aria-live="assertive">
					<strong id="error-status">Status 400</strong>
					<span id="error-message">Something went wrong while validating the request.</span>
				</div>

				<div class="actions">
					<a class="button primary" href="/o/admin">Open App Registration</a>
					<a class="button secondary" href="/o/.well-known/openid-configuration">
						View OIDC Metadata
					</a>
				</div>
			</section>
		</main>

		<script>
			const params = new URLSearchParams(window.location.search);
			const title = params.get("title") || "Authorization Error";
			const message =
				params.get("message") || "Something went wrong while validating the request.";
			const status = params.get("status") || "400";

			document.title = `${title} | OIDC Auth`;
			document.querySelector("#error-title").textContent = title;
			document.querySelector("#error-status").textContent = `Status ${status}`;
			document.querySelector("#error-message").textContent = message;
		</script>
	</body>
</html>
