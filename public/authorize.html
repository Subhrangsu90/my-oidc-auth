<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Login | browcodex Auth</title>
		<link rel="stylesheet" href="/oidc.css" />
	</head>

	<body>
		<main>
			<section class="login-card" aria-labelledby="login-title">
				<div class="brand" aria-label="browcodex Auth">
					<div class="brand-mark">bc</div>
					<div class="brand-text">
						<strong>browcodex Auth</strong>
						<span>by Subhrangsu</span>
					</div>
				</div>

				<h1 id="login-title">Login</h1>
				<p class="subtitle">Enter your profile details and password to continue.</p>
				<div id="client-context" class="client-context" aria-live="polite">
					<span>Signing in to</span>
					<strong id="client-name"></strong>
					<a id="client-url" href="#" target="_blank" rel="noreferrer"></a>
				</div>

				<form id="login-form">
					<label for="email">
						Email
						<input
							id="email"
							name="email"
							type="email"
							autocomplete="email"
							placeholder="you@example.com"
							required />
					</label>

					<label for="password">
						Password
						<input
							id="password"
							name="password"
							type="password"
							autocomplete="current-password"
							placeholder="Enter password"
							minlength="6"
							required />
					</label>

					<button type="submit">Sign in</button>
				</form>

				<p id="status" class="status" role="status" aria-live="polite"></p>

				<p class="helper-text">
					Don't have an account?
					<a id="sign-up-link" href="/o/sign-up">Sign up</a>
				</p>
			</section>
		</main>

		<script>
			const form = document.querySelector("#login-form");
			const statusMessage = document.querySelector("#status");
			const submitButton = form.querySelector("button");
			const authorizationParams = new URLSearchParams(window.location.search);
			const signUpLink = document.querySelector("#sign-up-link");
			const clientContext = document.querySelector("#client-context");
			const clientName = document.querySelector("#client-name");
			const clientUrl = document.querySelector("#client-url");
			const requiredParams = ["client_id", "redirect_uri", "response_type"];

			function getAuthorizationError() {
				for (const param of requiredParams) {
					if (!authorizationParams.get(param)) {
						return `${param} is required to continue.`;
					}
				}

				if (authorizationParams.get("response_type") !== "code") {
					return "response_type must be code.";
				}

				return "";
			}

			if (authorizationParams.toString()) {
				signUpLink.href = `/o/sign-up?${authorizationParams.toString()}`;
			}

			function setStatus(message, type) {
				statusMessage.textContent = message;
				statusMessage.className = `status show ${type}`;
			}

			async function loadClientContext() {
				const authorizationError = getAuthorizationError();

				if (authorizationError) {
					setStatus(authorizationError, "error");
					submitButton.disabled = true;
					return;
				}

				const clientId = authorizationParams.get("client_id");

				try {
					const response = await fetch(
						`/o/auth/application?client_id=${encodeURIComponent(clientId)}`
					);
					const data = await response.json();

					if (!response.ok) {
						throw new Error(data.message || "Unable to load application details.");
					}

					clientName.textContent = data.applicationName || data.clientId;
					clientUrl.textContent = data.applicationURL;
					clientUrl.href = data.applicationURL;
					clientContext.classList.add("show");
				} catch (error) {
					setStatus(error.message || "Unable to load application details.", "error");
				}
			}

			loadClientContext();

			form.addEventListener("submit", async (event) => {
				event.preventDefault();

				const formData = new FormData(form);
				submitButton.disabled = true;
				submitButton.textContent = "Signing in...";
				statusMessage.className = "status";

				try {
					const response = await fetch("/o/auth/authorize/sign-in", {
						method: "POST",
						headers: {
							"Content-Type": "application/json",
						},
						body: JSON.stringify({
							email: formData.get("email"),
							password: formData.get("password"),
							clientId: authorizationParams.get("client_id"),
							redirectUri: authorizationParams.get("redirect_uri"),
							state: authorizationParams.get("state"),
						}),
					});

					const data = await response.json();

					if (!response.ok) {
						throw new Error(data.message || "Unable to sign in.");
					}

					if (data.redirectTo) {
						window.location.assign(data.redirectTo);
						return;
					}
				} catch (error) {
					setStatus(error.message || "Something went wrong. Please try again.", "error");
				} finally {
					submitButton.disabled = false;
					submitButton.textContent = "Sign in";
				}
			});
		</script>
	</body>
</html>
